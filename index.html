<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Pro | Limpieza de Alta Gama</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #ffffff; color: #333; }

        /* NAV */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 1.5rem; font-weight: bold; cursor: pointer; color: #333; }
        .logo span { color: #0088cc; }
        .nav-menu span { margin-left: 20px; font-weight: 500; cursor: pointer; }

        /* HERO */
        .hero { display: flex; align-items: center; justify-content: space-between; padding: 60px 8%; flex-wrap: wrap; gap: 20px; }
        .hero-text { flex: 1; min-width: 300px; }
        .hero-text h1 { font-size: 3.5rem; color: #0099cc; line-height: 1.1; }
        .hero-text p { margin: 20px 0; font-size: 1.2rem; color: #666; }
        
        .btn-ver, #btn-wsp { 
            display: inline-block; padding: 12px 25px; border-radius: 50px; 
            text-decoration: none; font-weight: bold; transition: 0.3s; margin-top: 10px;
        }
        .btn-ver { border: 2px solid #0099cc; color: #0099cc; background: transparent; }
        #btn-wsp { background: #25d366; color: white; margin-left: 10px; }

        .media-box { width: 400px; height: 400px; background: #f0f0f0; border-radius: 30px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .media-box img, .media-box video { width: 100%; height: 100%; object-fit: cover; }

        /* INFO BAR */
        .info-bar { background: #00abc6; color: white; display: flex; justify-content: space-around; padding: 20px; margin: 20px 8%; border-radius: 20px; flex-wrap: wrap; gap: 10px; }

        /* SERVICIOS */
        .services { padding: 40px 8%; text-align: center; }
        .service-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .service { padding: 30px; border-radius: 20px; background: #f9f9f9; font-weight: bold; transition: 0.3s; }
        .service:hover { background: #0099cc; color: white; }

        /* GALERÍA (AQUÍ ESTÁ EL CAMBIO DE TAMAÑO) */
        .gallery { padding: 60px 8%; text-align: center; background: #fdfdfd; }
        .gallery-grid { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 30px; 
        }
        .gallery-grid img, .gallery-grid video { 
            width: 180px; /* Tamaño pequeño fijo */
            height: 130px; 
            object-fit: cover; 
            border-radius: 12px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .gallery-grid img:hover { transform: scale(1.1); }

        /* FOOTER */
        footer { padding: 40px 8%; text-align: center; border-top: 1px solid #eee; }
        .social-links a { margin: 0 10px; color: #0099cc; text-decoration: none; font-weight: bold; }

        /* ADMIN PANEL */
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .admin-card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; max-height: 80vh; overflow-y: auto; }
        .admin-card label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.8rem; }
        .admin-card input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; }
        .btn-save { background: #00abc6; color: white; border: none; padding: 12px; width: 100%; margin-top: 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        @media(max-width: 768px) { .hero { flex-direction: column; text-align: center; } .media-box { width: 100%; height: 250px; } }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="toggleAdmin()">BUSINESS<span>PRO</span></div>
    <div class="nav-menu">
        <span>Residencial</span>
        <span>Comercial</span>
        <span>RD PREMIUM</span>
    </div>
</nav>

<header class="hero">
    <div class="hero-text">
        <h1 id="txt-title">Limpieza de Alta Gama</h1>
        <p id="txt-desc">Soluciones profesionales de higiene.</p>
        <button class="btn-ver">Ver Servicios</button>
        <a id="btn-wsp" target="_blank" style="display:none">WhatsApp</a>
    </div>
    <div class="media-box" id="main-display"></div>
</header>

<div class="info-bar">
    <span>📍 Domicilio Disponible</span>
    <span>✨ Calidad Garantizada</span>
    <span>🛡️ Personal Asegurado</span>
</div>

<section class="services">
    <h2>Servicios</h2>
    <div class="service-grid" id="services-container"></div>
</section>

<section class="gallery">
    <h2>Galería de Proyectos</h2>
    <div class="gallery-grid" id="gallery"></div>
</section>

<footer>
    <p>© 2026 Business Pro RD</p>
    <div class="social-links">
        <a id="link-ig" href="#" target="_blank">Instagram</a>
        <a id="link-fb" href="#" target="_blank">Facebook</a>
    </div>
</footer>

<div id="admin-panel">
    <div class="admin-card">
        <h2>Panel de Control</h2>
        <label>Título principal</label>
        <input type="text" id="admin-title">
        
        <label>Descripción</label>
        <input type="text" id="admin-desc">

        <label>WhatsApp (Número sin espacios)</label>
        <input type="text" id="admin-whatsapp" placeholder="Ej: 18490000000">

        <label>Instagram (Link)</label>
        <input type="text" id="admin-ig">

        <label>Facebook (Link)</label>
        <input type="text" id="admin-fb">

        <label>Servicios (Separados por coma)</label>
        <input type="text" id="admin-services" placeholder="Oficinas, Casas, Muebles">

        <label>Foto de Portada</label>
        <input type="file" id="up-hero">

        <label>Agregar a Galería</label>
        <input type="file" id="up-gal">

        <button class="btn-save" onclick="saveAll()">Guardar Todo</button>
        <button class="btn-save" onclick="toggleAdmin()" style="background:#666">Cerrar</button>
    </div>
</div>

<script>
function toggleAdmin() {
    const p = document.getElementById("admin-panel");
    p.style.display = (p.style.display === "flex") ? "none" : "flex";
}

function saveAll() {
    localStorage.setItem("title", document.getElementById("admin-title").value);
    localStorage.setItem("desc", document.getElementById("admin-desc").value);
    localStorage.setItem("whatsapp", document.getElementById("admin-whatsapp").value);
    localStorage.setItem("ig", document.getElementById("admin-ig").value);
    localStorage.setItem("fb", document.getElementById("admin-fb").value);
    localStorage.setItem("services", document.getElementById("admin-services").value);

    // Guardar Hero
    const heroFile = document.getElementById("up-hero").files[0];
    if(heroFile) {
        const reader = new FileReader();
        reader.onload = (e) => {
            localStorage.setItem("hero-img", e.target.result);
            localStorage.setItem("hero-type", heroFile.type);
            loadData();
        };
        reader.readAsDataURL(heroFile);
    }

    // Guardar Galería
    const galFile = document.getElementById("up-gal").files[0];
    if(galFile) {
        const reader = new FileReader();
        reader.onload = (e) => {
            let gallery = JSON.parse(localStorage.getItem("gallery-data") || "[]");
            gallery.push({img: e.target.result, type: galFile.type});
            localStorage.setItem("gallery-data", JSON.stringify(gallery));
            loadData();
        };
        reader.readAsDataURL(galFile);
    }

    loadData();
    alert("¡Datos actualizados!");
}

function loadData() {
    // Textos
    document.getElementById("txt-title").innerText = localStorage.getItem("title") || "Limpieza de Alta Gama";
    document.getElementById("txt-desc").innerText = localStorage.getItem("desc") || "Soluciones profesionales de higiene.";
    
    // WhatsApp
    const wsp = localStorage.getItem("whatsapp");
    if(wsp) {
        document.getElementById("btn-wsp").style.display = "inline-block";
        document.getElementById("btn-wsp").href = "https://wa.me/" + wsp;
    }

    // Redes
    document.getElementById("link-ig").href = localStorage.getItem("ig") || "#";
    document.getElementById("link-fb").href = localStorage.getItem("fb") || "#";

    // Servicios
    const svs = localStorage.getItem("services") || "Limpieza Residencial, Oficinas, Desinfección, Limpieza Profunda";
    const container = document.getElementById("services-container");
    container.innerHTML = "";
    svs.split(",").forEach(s => {
        container.innerHTML += `<div class="service">${s.trim()}</div>`;
    });

    // Cargar Hero
    const heroImg = localStorage.getItem("hero-img");
    const heroType = localStorage.getItem("hero-type");
    if(heroImg) {
        const box = document.getElementById("main-display");
        box.innerHTML = heroType.includes("video") ? `<video src="${heroImg}" autoplay muted loop></video>` : `<img src="${heroImg}">`;
    }

    // Cargar Galería
    const gallery = JSON.parse(localStorage.getItem("gallery-data") || "[]");
    const galCont = document.getElementById("gallery");
    galCont.innerHTML = "";
    gallery.forEach(item => {
        galCont.innerHTML += item.type.includes("video") ? `<video src="${item.img}" controls></video>` : `<img src="${item.img}">`;
    });
}

window.onload = () => {
    loadData();
    // Pre-rellenar formulario
    document.getElementById("admin-title").value = localStorage.getItem("title") || "";
    document.getElementById("admin-desc").value = localStorage.getItem("desc") || "";
    document.getElementById("admin-whatsapp").value = localStorage.getItem("whatsapp") || "";
    document.getElementById("admin-ig").value = localStorage.getItem("ig") || "";
    document.getElementById("admin-fb").value = localStorage.getItem("fb") || "";
    document.getElementById("admin-services").value = localStorage.getItem("services") || "";
};
</script>
</body>
</html>
